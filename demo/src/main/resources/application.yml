# 服务器配置
server:
  port: 8080
  address: 0.0.0.0

# Spring 配置
spring:
  application:
    name: scooter-rental-system
  # 数据库配置（云服务器）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://47.108.188.221:3306/sep2db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: sep2user
    password: Sep2Pass2026!
  # 邮件配置（开发环境可填占位；生产环境请配置真实 SMTP）
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# MyBatis 配置
mybatis:
  # Mapper XML 文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名包
  type-aliases-package: com.example.demo.entity
  # 开启驼峰命名映射
  configuration:
    map-underscore-to-camel-case: true
  # 打印 SQL 日志（开发时使用）
  log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.example.demo: debug
